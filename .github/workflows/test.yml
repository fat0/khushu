name: Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - 'openspec/**'
      - 'image_ref/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - run: flutter pub get

      - run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - run: flutter test
