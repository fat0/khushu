name: Release Build

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version needs releasing
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version in VERSION file: '$VERSION'"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null | sed 's/^v//' || echo "")

          echo "version=$VERSION latest_release=$LATEST_RELEASE"

          if [ "$VERSION" != "$LATEST_RELEASE" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION already released"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Sync version to pubspec.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BUILD=$(( $(gh release list --json tagName --jq 'length') + 1 ))
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          echo "Updated pubspec.yaml to ${VERSION}+${BUILD}"

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/khushu-release.jks

      - name: Build signed AAB
        env:
          KEYSTORE_PATH: /tmp/khushu-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build appbundle --release

      - name: Rename AAB
        run: cp build/app/outputs/bundle/release/app-release.aab "khushu-v${{ needs.check-version.outputs.version }}.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: khushu-v${{ needs.check-version.outputs.version }}
          path: "khushu-v${{ needs.check-version.outputs.version }}.aab"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            --title "Khushu v${{ needs.check-version.outputs.version }}" \
            --notes-file CHANGELOG.md \
            "khushu-v${{ needs.check-version.outputs.version }}.aab"

      - name: Deploy to Play Store (internal testing)
        run: |
          gem install fastlane
          echo '${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}' > /tmp/play-store-key.json
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --track internal \
            --package_name dev.khushu \
            --json_key /tmp/play-store-key.json \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/khushu-release.jks
          rm -f /tmp/play-store-key.json
